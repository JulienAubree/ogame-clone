services:
  postgres:
    image: postgres:16-alpine
    container_name: ogame-postgres
    environment:
      POSTGRES_USER: ogame
      POSTGRES_PASSWORD: ogame
      POSTGRES_DB: ogame
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ogame-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
